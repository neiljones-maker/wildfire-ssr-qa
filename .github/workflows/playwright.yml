name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_inf_291:
        description: 'INF-291 — Font Declaration Injection'
        type: boolean
        default: false
      run_inf_293:
        description: 'INF-293 — Belk Injection Point Fix'
        type: boolean
        default: false
      run_inf_280:
        description: 'INF-280 — onMessageExternal Listener'
        type: boolean
        default: false
      run_rc:
        description: 'RC — Install Flow (specify rc_name below)'
        type: boolean
        default: false
      rc_name:
        description: 'RC folder to test (e.g. RC.ca86dc0). Leave blank for default.'
        type: string
        default: 'RC.ca86dc0'
      extension_url:
        description: 'Direct URL to extension zip (overrides extension_tag when set)'
        type: string
        default: ''
      extension_tag:
        description: 'Release tag to test (leave blank for latest; ignored when extension_url is set)'
        type: string
        default: ''
      test_description:
        description: 'What is being tested in this run (written to job summary)'
        type: string
        default: ''

env:
  EXTENSION_PATH: ${{ github.workspace }}/extension-build

jobs:
  test-inf-291:
    name: INF-291 — Font Declaration Injection
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_inf_291 }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Download extension build
        run: |
          mkdir -p "$EXTENSION_PATH" /tmp/ext-download
          if [ -n "$EXTENSION_URL" ]; then
            curl -H "Authorization: Bearer $GH_TOKEN" -L -o /tmp/ext-download/extension.zip "$EXTENSION_URL"
          else
            gh release download ${EXTENSION_TAG:+"$EXTENSION_TAG"} \
              --repo "$EXTENSION_REPO" \
              --pattern "*chrome-development*.zip" \
              --dir /tmp/ext-download
          fi
          unzip /tmp/ext-download/*.zip -d "$EXTENSION_PATH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EXTENSION_REPO: ${{ secrets.EXTENSION_REPO }}
          EXTENSION_TAG: ${{ inputs.extension_tag }}
          EXTENSION_URL: ${{ inputs.extension_url }}

      - name: Write test description
        if: ${{ inputs.test_description != '' }}
        run: |
          echo "## Test Description" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.test_description }}" >> $GITHUB_STEP_SUMMARY

      - name: Run INF-291 tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test INF-291/ --reporter=list,html
        env:
          EXTENSION_PATH: ${{ env.EXTENSION_PATH }}
          PLAYWRIGHT_HTML_REPORT: INF-291/playwright-report

      - name: Upload INF-291 report and test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: INF-291-playwright-report
          path: |
            INF-291/playwright-report/
            test-results/
          retention-days: 30

  test-inf-293:
    name: INF-293 — Belk Injection Point Fix
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_inf_293 }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Download extension build
        run: |
          mkdir -p "$EXTENSION_PATH" /tmp/ext-download
          if [ -n "$EXTENSION_URL" ]; then
            curl -H "Authorization: Bearer $GH_TOKEN" -L -o /tmp/ext-download/extension.zip "$EXTENSION_URL"
          else
            gh release download ${EXTENSION_TAG:+"$EXTENSION_TAG"} \
              --repo "$EXTENSION_REPO" \
              --pattern "*chrome-development*.zip" \
              --dir /tmp/ext-download
          fi
          unzip /tmp/ext-download/*.zip -d "$EXTENSION_PATH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EXTENSION_REPO: ${{ secrets.EXTENSION_REPO }}
          EXTENSION_TAG: ${{ inputs.extension_tag }}
          EXTENSION_URL: ${{ inputs.extension_url }}

      - name: Write test description
        if: ${{ inputs.test_description != '' }}
        run: |
          echo "## Test Description" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.test_description }}" >> $GITHUB_STEP_SUMMARY

      - name: Run INF-293 tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test INF-293/ --reporter=list,html
        env:
          EXTENSION_PATH: ${{ env.EXTENSION_PATH }}
          PLAYWRIGHT_HTML_REPORT: INF-293/playwright-report

      - name: Upload INF-293 report and test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: INF-293-playwright-report
          path: |
            INF-293/playwright-report/
            test-results/
          retention-days: 30

  test-inf-280:
    name: INF-280 — onMessageExternal Listener
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_inf_280 }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Download extension build
        run: |
          mkdir -p "$EXTENSION_PATH" /tmp/ext-download
          if [ -n "$EXTENSION_URL" ]; then
            curl -H "Authorization: Bearer $GH_TOKEN" -L -o /tmp/ext-download/extension.zip "$EXTENSION_URL"
          else
            gh release download ${EXTENSION_TAG:+"$EXTENSION_TAG"} \
              --repo "$EXTENSION_REPO" \
              --pattern "*chrome-development*.zip" \
              --dir /tmp/ext-download
          fi
          unzip /tmp/ext-download/*.zip -d "$EXTENSION_PATH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EXTENSION_REPO: ${{ secrets.EXTENSION_REPO }}
          EXTENSION_TAG: ${{ inputs.extension_tag }}
          EXTENSION_URL: ${{ inputs.extension_url }}

      - name: Write test description
        if: ${{ inputs.test_description != '' }}
        run: |
          echo "## Test Description" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.test_description }}" >> $GITHUB_STEP_SUMMARY

      - name: Run INF-280 tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test INF-280/ --reporter=list,html
        env:
          EXTENSION_PATH: ${{ env.EXTENSION_PATH }}
          PLAYWRIGHT_HTML_REPORT: INF-280/playwright-report

      - name: Upload INF-280 report and test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: INF-280-playwright-report
          path: |
            INF-280/playwright-report/
            test-results/
          retention-days: 30

  test-rc:
    # To test a different RC: dispatch with run_rc=true and rc_name=RC.<hash>.
    # If that folder doesn't exist yet it will be created from the RC.ca86dc0
    # template and pushed to the repo automatically before tests run.
    name: ${{ inputs.rc_name || 'RC.ca86dc0' }} — Install Flow
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_rc }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create RC folder if it doesn't exist
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rc_name != '' && inputs.rc_name != 'RC.ca86dc0' }}
        run: |
          RC="${{ inputs.rc_name }}"
          if [ ! -d "$RC" ]; then
            echo "RC folder '$RC' not found — creating from RC.ca86dc0 template"
            cp -r RC.ca86dc0 "$RC"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$RC/"
            git commit -m "ci: add $RC test folder"
            git push
            echo "Created and pushed $RC/"
          else
            echo "RC folder '$RC' already exists — skipping create"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Download extension build
        run: |
          mkdir -p "$EXTENSION_PATH" /tmp/ext-download
          if [ -n "$EXTENSION_URL" ]; then
            curl -H "Authorization: Bearer $GH_TOKEN" -L -o /tmp/ext-download/extension.zip "$EXTENSION_URL"
          else
            gh release download ${EXTENSION_TAG:+"$EXTENSION_TAG"} \
              --repo "$EXTENSION_REPO" \
              --pattern "*chrome-development*.zip" \
              --dir /tmp/ext-download
          fi
          unzip /tmp/ext-download/*.zip -d "$EXTENSION_PATH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EXTENSION_REPO: ${{ secrets.EXTENSION_REPO }}
          EXTENSION_TAG: ${{ inputs.extension_tag }}
          EXTENSION_URL: ${{ inputs.extension_url }}

      - name: Write test description
        if: ${{ inputs.test_description != '' }}
        run: |
          echo "## Test Description" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.test_description }}" >> $GITHUB_STEP_SUMMARY

      - name: Run RC tests
        run: |
          RC="${{ inputs.rc_name || 'RC.ca86dc0' }}"
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
            npx playwright test "$RC/" --reporter=list,html
        env:
          EXTENSION_PATH: ${{ env.EXTENSION_PATH }}
          PLAYWRIGHT_HTML_REPORT: ${{ inputs.rc_name || 'RC.ca86dc0' }}/playwright-report

      - name: Upload RC report and test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: RC-playwright-report
          path: |
            ${{ inputs.rc_name || 'RC.ca86dc0' }}/playwright-report/
            test-results/
          retention-days: 30

  deploy-pages:
    name: Publish Reports to GitHub Pages
    needs: [test-inf-291, test-inf-293, test-inf-280, test-rc]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download INF-291 report
        uses: actions/download-artifact@v4
        with:
          name: INF-291-playwright-report
          path: pages/INF-291
        continue-on-error: true

      - name: Download INF-293 report
        uses: actions/download-artifact@v4
        with:
          name: INF-293-playwright-report
          path: pages/INF-293
        continue-on-error: true

      - name: Download INF-280 report
        uses: actions/download-artifact@v4
        with:
          name: INF-280-playwright-report
          path: pages/INF-280
        continue-on-error: true

      - name: Download RC report
        uses: actions/download-artifact@v4
        with:
          name: RC-playwright-report
          path: pages/RC
        continue-on-error: true

      - name: Create index page
        run: |
          mkdir -p pages
          RC_NAME="${{ inputs.rc_name }}"
          RC_NAME="${RC_NAME:-RC.ca86dc0}"
          TEST_DESC="${{ inputs.test_description }}"
          cat > pages/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Wildfire SSR QA — Playwright Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 640px; margin: 60px auto; padding: 0 24px; color: #24292f; }
              h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
              p { color: #57606a; margin-bottom: 32px; font-size: 0.9rem; }
              .desc { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 12px 16px; margin-bottom: 24px; font-size: 0.9rem; color: #24292f; white-space: pre-wrap; }
              ul { list-style: none; padding: 0; margin: 0; }
              li { margin-bottom: 12px; }
              a { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 8px; text-decoration: none; color: #0969da; font-weight: 500; font-size: 0.95rem; transition: background 0.15s; }
              a:hover { background: #ddf4ff; border-color: #0969da; }
              .badge { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; background: #dafbe1; color: #116329; margin-left: auto; }
            </style>
          </head>
          <body>
            <h1>Wildfire SSR QA — Playwright Reports</h1>
            <p>Latest test results per ticket. Reports update on every CI run.</p>
            $([ -n "$TEST_DESC" ] && echo "<div class=\"desc\">$TEST_DESC</div>" || echo "")
            <ul>
              <li><a href="INF-291/">INF-291 — Font Declaration Injection <span class="badge">E2E</span></a></li>
              <li><a href="INF-293/">INF-293 — Belk Injection Point Fix <span class="badge">E2E</span></a></li>
              <li><a href="INF-280/">INF-280 — onMessageExternal Listener <span class="badge">E2E</span></a></li>
              <li><a href="RC/">${RC_NAME} — Install Flow: Onboarding Tab &amp; Login CTA <span class="badge">E2E</span></a></li>
            </ul>
          </body>
          </html>
          HTMLEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          keep_files: false
