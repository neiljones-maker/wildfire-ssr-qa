name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  EXTENSION_PATH: ${{ github.workspace }}/extension-build

jobs:
  test-inf-291:
    name: INF-291 — Font Declaration Injection
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Download extension build
        run: |
          mkdir -p ${{ env.EXTENSION_PATH }}
          gh release download ${{ secrets.EXTENSION_TAG }} \
            --repo ${{ secrets.EXTENSION_REPO }} \
            --pattern "*.zip" \
            --output /tmp/extension.zip
          unzip /tmp/extension.zip -d ${{ env.EXTENSION_PATH }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run INF-291 tests
        run: PLAYWRIGHT_HTML_REPORT=INF-291/playwright-report npx playwright test INF-291/
        env:
          EXTENSION_PATH: ${{ env.EXTENSION_PATH }}

      - name: Upload INF-291 report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: INF-291-playwright-report
          path: INF-291/playwright-report/
          retention-days: 30

